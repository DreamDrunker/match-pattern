name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v0.3.0
        required: true
        type: string

permissions:
  contents: read

env:
  PUBLISH_REF: ${{ github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          registry-url: "https://registry.npmjs.org"
      - run: yarn install --frozen-lockfile
      - run: yarn test:ts:typecheck
      - run: yarn test:ts:node
      - run: npx playwright install --with-deps chromium
      - run: yarn test:ts:browser
      - run: yarn test:rs
      - run: yarn test:rs:wasm
      - run: yarn verify:rs-pkg

  publish-rs:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - id: rs-version
        run: |
          version=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("rs/pkg/package.json", "utf8")).version)')
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - id: rs-check
        run: |
          if npm view @weiqu_/match-pattern-rs@${{ steps.rs-version.outputs.value }} version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.rs-check.outputs.publish == 'true'
        run: wasm-pack publish --access public
        working-directory: rs

  publish-ts:
    runs-on: ubuntu-latest
    needs: publish-rs
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn
          registry-url: "https://registry.npmjs.org"
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - id: ts-version
        run: |
          version=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("ts/package.json", "utf8")).version)')
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - id: ts-check
        run: |
          if npm view @weiqu_/match-pattern-ts@${{ steps.ts-version.outputs.value }} version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.ts-check.outputs.publish == 'true'
        run: npm publish --access public
        working-directory: ts

  create-release:
    runs-on: ubuntu-latest
    needs: publish-ts
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
